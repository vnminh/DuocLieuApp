services:
  db:
    image: postgres:16-alpine
    container_name: duoc-lieu-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: duoclieu
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d duoclieu']
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - duoc-lieu-network

  be:
    build:
      context: ./duoc-lieu-be
      dockerfile: Dockerfile
    container_name: duoc-lieu-be
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '3001:3001'
    volumes:
      - ./duoc-lieu-be/upload:/app/upload
    networks:
      - duoc-lieu-network

  fe:
    build:
      context: ./duoc-lieu-fe/duoc-lieu-fe
      dockerfile: Dockerfile
    container_name: duoc-lieu-fe
    restart: unless-stopped
    depends_on:
      - be
    ports:
      - '8080:8080'
    networks:
      - duoc-lieu-network

volumes:
  postgres_data:

networks:
  duoc-lieu-network:
    driver: bridge
